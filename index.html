<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGOT PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.card{
max-width:800px;
margin:20px auto;
padding:20px;
background:#0f172a;
border-radius:16px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
font-weight:bold;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

.hidden{display:none;}

.top{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
}

.answer-btn{
display:block;
width:100%;
margin-top:10px;
padding:10px;
background:#1e293b;
color:white;
border-radius:10px;
cursor:pointer;
}

.correct{background:#22c55e !important;}
.wrong{background:#ef4444 !important;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
<h2>MGOT LOGIN</h2>
<input id="username" placeholder="Enter username">
<button onclick="login()">Enter</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card hidden">

<div class="top">
<div>XP: <span id="xp">0</span></div>
<div>Player: <span id="player"></span></div>
<div>Q: <span id="qnum"></span></div>
</div>

<h2 id="question"></h2>
<div id="answers"></div>

</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>Finished 🎉</h2>
<p>XP: <span id="finalxp"></span></p>
<button onclick="restart()">Restart</button>
</div>

<!-- LEADERBOARD -->
<div class="card">
<h2>Leaderboard</h2>
<button onclick="loadBoard()">Refresh</button>
<ul id="board"></ul>
</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= USER ================= */
let user = null;

/* ================= GAME ================= */
let i = 0;
let xp = 0;

/* ================= QUESTIONS ================= */
const q = [
{
q:"What does MGOT stand for?",
a:["Mindset Growth Optimization Token","Wrong","Wrong","Wrong"],
c:0
},
{
q:"MGOT focuses on?",
a:["Growth & mindset","Gambling","Random stuff","Nothing"],
c:0
},
{
q:"XP means?",
a:["Progress","Money","Luck","Time"],
c:0
},
{
q:"Goal of MGOT?",
a:["Self improvement","Entertainment only","Loss","Chaos"],
c:0
}
];

/* ================= LOGIN ================= */
function login(){
user = document.getElementById("username").value;
if(!user) return;

document.getElementById("login").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

document.getElementById("player").innerText = user;

loadQ();
}

/* ================= LOAD QUESTION ================= */
function loadQ(){

if(i >= q.length){
finish();
return;
}

document.getElementById("qnum").innerText = (i+1)+"/"+q.length;

let cur = q[i];
document.getElementById("question").innerText = cur.q;

let box = document.getElementById("answers");
box.innerHTML = "";

cur.a.forEach((ans,idx)=>{
let b = document.createElement("button");
b.className="answer-btn";
b.innerText = ans;

b.onclick = ()=>check(idx);

box.appendChild(b);
});

}

/* ================= CHECK ANSWER ================= */
function check(idx){
let cur = q[i];
let buttons = document.querySelectorAll(".answer-btn");

buttons.forEach(b=>b.disabled=true);

if(idx === cur.c){
buttons[idx].classList.add("correct");
xp += 10;
document.getElementById("xp").innerText = xp;
}else{
buttons[idx].classList.add("wrong");
buttons[cur.c].classList.add("correct");
}

setTimeout(()=>{
i++;
loadQ();
},700);
}

/* ================= FINISH ================= */
function finish(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("finalxp").innerText = xp;

save();
}

/* ================= SAVE TO FIREBASE ================= */
function save(){
db.collection("leaderboard").doc(user).set({
name:user,
xp:xp,
time:Date.now()
});

loadBoard();
}

/* ================= LEADERBOARD ================= */
function loadBoard(){
db.collection("leaderboard").get().then(snap=>{
let arr = [];

snap.forEach(doc=>{
arr.push(doc.data());
});

arr.sort((a,b)=>b.xp-a.xp);

document.getElementById("board").innerHTML =
arr.map(p=>`<li>${p.name} - ${p.xp} XP</li>`).join("");
});
}

/* ================= RESTART ================= */
function restart(){
location.reload();
}

/* auto load */
loadBoard();

</script>

</body>
</html>
